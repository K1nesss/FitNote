<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitNote Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f4ef;
        color: #1c1c1e;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
      }

      main {
        width: min(320px, calc(100vw - 40px));
        border-radius: 32px;
        background: rgba(255, 253, 249, 0.78);
        padding: 28px;
        text-align: center;
        box-shadow: 0 18px 46px rgba(80, 67, 46, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>FitNote</h1>
      <p>离线中</p>
    </main>
  </body>
</html>
